task_id: c05_api_migration__small
language: python
category: api_migration
instructions: |
  Migrate every `print(...)` call in `logging_helpers.py` and `main.py` to use
  the standard library `logging` module instead. Specifically:

  1. In each file, add `import logging` (if not already imported) and a
     module-level `logger = logging.getLogger(__name__)` near the other
     imports.
  2. Replace every `print(<args>)` call with `logger.info(<args>)`. The
     argument expressions must be passed through unchanged.

  Do NOT remove any other code. Function behaviour must remain identical
  apart from the logging mechanism — the functions must still return whatever
  they returned before (here: `None` for the helpers, the dict for `handle`).
files_in_context:
  - logging_helpers.py
  - main.py
oracle_cmd: ["python", "-m", "pytest", "-q", "tests/", "_overlay/tests/"]
