task_id: c05_api_migration__large
language: python
category: api_migration
instructions: |
  Migrate every `print(...)` call across the `ecom/` package to use the
  standard library `logging` module instead.

  1. Find every module under `ecom/` that calls `print(...)` and replace
     each call with `logger.info(<args>)`. The argument expressions must be
     passed through unchanged.
  2. For each migrated module, add `import logging` (if not already imported)
     and define a module-level `logger = logging.getLogger(__name__)`.
  3. In `ecom/__init__.py`, add a `setup_logging()` function that calls
     `logging.basicConfig(level=logging.INFO)`. Importing
     `ecom.setup_logging` must work afterwards; calling it must not raise.

  Function return values must remain identical to before the migration. The
  existing regression test suite (`tests/`) must still pass.
files_in_context:
  - ecom/notifications.py
  - ecom/__init__.py
oracle_cmd: ["python", "-m", "pytest", "-q", "tests/", "_overlay/tests/"]
