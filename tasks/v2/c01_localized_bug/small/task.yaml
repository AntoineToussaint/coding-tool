instructions: |
  There is an off-by-one bug in `age.py`. The function `is_adult` uses the
  wrong comparison operator: someone exactly at `LEGAL_AGE` (18) is currently
  classified as a minor instead of an adult. Fix `is_adult` so that an age
  equal to `LEGAL_AGE` returns `True`.

  Do not modify `is_senior` or `is_minor` — they are correct as written.
