task_id: c12_hygiene__small
language: python
category: hygiene
instructions: |
  Add error handling and logging to `divider.py` without changing the happy-path
  behavior of any function.

  Concretely:
    1. At the top of `divider.py`, add `import logging` and a module-level
       `logger = logging.getLogger(__name__)`.
    2. Wrap the body of `divide(a, b)` in a `try / except ZeroDivisionError`
       block that returns `float("inf")` when the divisor is zero.
    3. Rewrite `safe_divide_all(numbers, denom)` so that:
         - if `denom == 0`, it logs `logger.error("safe_divide_all: zero denominator")`
           and returns `None`.
         - otherwise it returns `[divide(n, denom) for n in numbers]` as before.
       Wrap the body in `try / except Exception` for safety: on any unexpected
       error, call `logger.error(...)` with a formatted message and return
       `None`.
    4. Rewrite `average(values)` so that:
         - if `len(values) == 0`, it logs `logger.error("average: empty input")`
           and returns `None`.
         - otherwise it returns `divide(sum(values), len(values))` as before.
       Same `try / except Exception` wrapping for safety.

  The happy-path return values for non-empty / non-zero inputs must be
  unchanged.
files_in_context:
  - divider.py
oracle_cmd: ["python", "-m", "pytest", "-q", "tests/", "_overlay/tests/"]
