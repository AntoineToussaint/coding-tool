task_id: c12_hygiene__large
language: python
category: hygiene
instructions: |
  Improve error handling around the inventory layer in `ecom/orders.py`.

  Concretely:
    1. At the top of `ecom/orders.py`, add `import logging` and
       `logger = logging.getLogger(__name__)`.
    2. Define a new exception in `ecom/orders.py`:

           class OrderError(Exception):
               pass

    3. Every site in `ecom/orders.py` that calls `inventory.reserve(...)`,
       `inventory.release(...)`, or `inventory.fulfill(...)` must be wrapped in
       a `try / except inventory.InventoryError`. In the `except` block:
         - log via `logger.warning(f"...{exc}")`
         - re-raise as `OrderError(str(exc))` (use `raise OrderError(...) from exc`).

       This applies to `create_order` (which calls `inventory.reserve`). The
       existing `cancel_order` handler that silently swallowed
       `inventory.InventoryError` must now re-raise as `OrderError` too.

    4. Do not change the rest of the modules — only `ecom/orders.py`.

  Existing happy-path tests must keep passing.
files_in_context:
  - ecom/orders.py
  - ecom/inventory.py
oracle_cmd: ["python", "-m", "pytest", "-q", "tests/", "_overlay/tests/"]
