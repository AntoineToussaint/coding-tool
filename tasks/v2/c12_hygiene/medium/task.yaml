task_id: c12_hygiene__medium
language: python
category: hygiene
instructions: |
  Improve error handling around `repo.get_order(...)` in `ecom/orders.py`.

  Concretely:
    1. At the top of `ecom/orders.py`, add `import logging` and
       `logger = logging.getLogger(__name__)`.
    2. Define a new exception in `ecom/orders.py`:

           class OrderNotFoundError(Exception):
               pass

    3. In every function that calls `repo.get_order(...)` (`ship_order`,
       `cancel_order`, `add_line`), wrap the call in a `try / except KeyError`.
       In the `except` block:
         - call `logger.exception(f"order {order_id} not found")`
         - raise `OrderNotFoundError(f"order {order_id} not found")` from the
           caught exception.

    4. `create_order` does NOT call `repo.get_order` — leave its body alone.

  All existing tests must keep passing.
files_in_context:
  - ecom/orders.py
oracle_cmd: ["python", "-m", "pytest", "-q", "tests/", "_overlay/tests/"]
